<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhập Key</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* CSS gốc được tích hợp từ SignUp_LogIn_Form.css */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            text-decoration: none;
            list-style: none;
        }

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(90deg, #e2e2e2, #c9d6ff);
        }

        .container{
            position: relative;
            width: 850px;
            height: 550px;
            background: #fff;
            margin: 20px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(0, 0, 0, .2);
            overflow: hidden;
        }

        .container h1{
            font-size: 36px;
            margin: -10px 0;
        }

        .container p{
            font-size: 14.5px;
            margin: 15px 0;
        }

        .form-box{
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: .6s ease-in-out 1.2s, visibility 0s 1s;
        }

        .container.active .form-box{ right: 50%; }

        .form-box.register{ visibility: hidden; }
        .container.active .form-box.register{ visibility: visible; }

        .input-box{
            position: relative;
            margin: 30px 0;
            width: 100%;
        }

        .input-box input{
            width: 100%;
            padding: 13px 50px 13px 20px;
            background: #eee;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }

        .input-box i{
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }

        .btn{
            width: 100%;
            height: 48px;
            background: #7494ec;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .1);
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
        }

        /* Tùy chỉnh cho phần hiển thị thông tin liên hệ */
        .contact-info {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
            border: 2px dashed #7494ec;
            margin-top: 20px;
        }

        .contact-info h2 {
            font-size: 18px;
            color: #7494ec;
            margin-bottom: 10px;
        }

        .contact-info p {
            font-weight: 600;
            font-size: 16px !important;
            color: #333;
        }

        .toggle-box{
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .toggle-box::before{
            content: '';
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            background: #7494ec;
            border-radius: 150px;
            z-index: 2;
            transition: 1.8s ease-in-out;
        }

        .container.active .toggle-box::before{ left: 50%; }

        .toggle-panel{
            position: absolute;
            width: 50%;
            height: 100%;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: .6s ease-in-out;
        }

        .toggle-panel.toggle-left{ 
            left: 0;
            transition-delay: 1.2s; 
        }
        .container.active .toggle-panel.toggle-left{
            left: -50%;
            transition-delay: .6s;
        }

        .toggle-panel.toggle-right{ 
            right: -50%;
            transition-delay: .6s;
        }
        .container.active .toggle-panel.toggle-right{
            right: 0;
            transition-delay: 1.2s;
        }

        .toggle-panel .btn{
            width: 160px;
            height: 46px;
            background: transparent;
            border: 2px solid #fff;
            box-shadow: none;
        }

        @media screen and (max-width: 650px){
            .container{ height: calc(100vh - 40px); }
            .form-box{ bottom: 0; width: 100%; height: 70%; }
            .container.active .form-box{ right: 0; bottom: 30%; }
            .toggle-box::before{ left: 0; top: -270%; width: 100%; height: 300%; border-radius: 20vw; }
            .container.active .toggle-box::before{ left: 0; top: 70%; }
            .toggle-panel{ width: 100%; height: 30%; }
            .toggle-panel.toggle-left{ top: 0; }
            .toggle-panel.toggle-right{ right: 0; bottom: -30%; }
            .container.active .toggle-panel.toggle-right{ bottom: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-box login">
            <form action="#">
                <h1>Nhập Key</h1>
                <div class="input-box">
                    <input type="text" placeholder="Điền Key Đã Mua" required>
                    <i class='bx bxs-key'></i>
                </div>
                <button type="submit" class="btn">Kích hoạt</button>
            </form>
        </div>

        <div class="form-box register">
            <div class="contact-content">
                <h1>Liên hệ mua Key</h1>
                <p>Vui lòng gửi yêu cầu hỗ trợ qua email, Hoặc Số Điện Thoại chính thức của chúng tôi.</p>
                
                <div class="contact-info">
                    <h2>GMAIL SUPPORT</h2>
                    <p>Vutungmanh1234@gmail.com</p>
                    <p>SĐT: 0986402922</p>
                </div>
                
                <p style="margin-top: 20px; color: #888;">Thời gian phản hồi dự kiến: 5 - 10 phút</p>
                <p style="margin-top: 20px; color: #888;">Lâu Nhất Trong 24h</p>
            </div>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Xin chào!</h1>
                <p>Bạn chưa có mã Key?</p>
                <button class="btn register-btn">Thông tin liên hệ</button>
            </div>

            <div class="toggle-panel toggle-right">
                <h1>Welcome!</h1>
                <p>Bạn đã có mã Key?</p>
                <button class="btn login-btn">Quay lại nhập Key</button>
            </div>
        </div>
    </div>

    <script>
        /* Logic chuyển đổi giao diện từ SignUp_LogIn_Form.js */
        const container = document.querySelector('.container');
        const registerBtn = document.querySelector('.register-btn');
        const loginBtn = document.querySelector('.login-btn');

        registerBtn.addEventListener('click', () => {
            container.classList.add('active');
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove('active');
        });
        function handleLogin() {
        const key = document.getElementById('keyInput').value;
        // Kiểm tra key (Bạn có thể thay bằng logic lấy từ localStorage)
        if(key === "ToolNgon123") { 
            sessionStorage.setItem('isLoggedIn', 'true');
            window.location.href = "main.html";
        } else {
            alert("Mã Key không chính xác!");
        }
    }
    </script>
</body>
</html>
